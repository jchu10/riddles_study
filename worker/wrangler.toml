name = "stumpers-verify"
main = "src/index.js"
compatibility_date = "2024-12-01"

[assets]
directory = "./" # or wherever your index.html lives
binding = "ASSETS"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
